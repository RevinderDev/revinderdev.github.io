{% if src %}
  <img src="{{ src | safe }}"{% if alt %} alt="{{ alt }}"{% endif %} class="{% if position %}{{ position }}{% else -%} center {%- endif %}" {%- if style %} style="{{ style | safe }}" {%- endif %} />
  
  {% if caption %}
    <small style="display: block; text-align: center; margin-top: 0.5rem; color: #666;">
      {{ caption | safe }}
    </small>
  {% endif %}
{% endif %}
